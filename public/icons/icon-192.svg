<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="192" height="192" rx="42" fill="url(#shine)"/>

  <!-- Plate circle -->
  <circle cx="96" cy="108" r="52" fill="none" stroke="white" stroke-width="6" opacity="0.95"/>
  <!-- Plate inner ring -->
  <circle cx="96" cy="108" r="40" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>

  <!-- Fork (left) -->
  <g transform="translate(62, 52)" stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.95">
    <line x1="0" y1="0" x2="0" y2="28"/>
    <line x1="-6" y1="0" x2="-6" y2="16"/>
    <line x1="6" y1="0" x2="6" y2="16"/>
    <path d="M-6 16 Q0 22 6 16"/>
    <line x1="0" y1="28" x2="0" y2="56"/>
  </g>

  <!-- Knife (right) -->
  <g transform="translate(130, 52)" stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.95">
    <line x1="0" y1="0" x2="0" y2="56"/>
    <path d="M0 0 Q10 10 0 28" fill="white" stroke="none" opacity="0.9"/>
  </g>

  <!-- Steam lines above plate -->
  <g stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.7">
    <path d="M84 72 Q80 64 84 56" fill="none"/>
    <path d="M96 70 Q92 62 96 54" fill="none"/>
    <path d="M108 72 Q104 64 108 56" fill="none"/>
  </g>

  <!-- Bottom label -->
  <text x="96" y="178" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="white" text-anchor="middle" opacity="0.9" letter-spacing="0.5">PANTRY TO PLATE</text>
</svg>
