<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>

  <!-- Plate circle -->
  <circle cx="256" cy="290" r="138" fill="none" stroke="white" stroke-width="14" opacity="0.95"/>
  <!-- Plate inner ring -->
  <circle cx="256" cy="290" r="106" fill="none" stroke="white" stroke-width="5" opacity="0.4"/>
  <!-- Plate center dot -->
  <circle cx="256" cy="290" r="18" fill="white" opacity="0.15"/>

  <!-- Fork (left) -->
  <g transform="translate(162, 128)" stroke="white" stroke-width="13" stroke-linecap="round" fill="none" opacity="0.95">
    <line x1="0" y1="0" x2="0" y2="72"/>
    <line x1="-16" y1="0" x2="-16" y2="44"/>
    <line x1="16" y1="0" x2="16" y2="44"/>
    <path d="M-16 44 Q0 60 16 44"/>
    <line x1="0" y1="72" x2="0" y2="148"/>
  </g>

  <!-- Knife (right) -->
  <g transform="translate(350, 128)" stroke="white" stroke-width="13" stroke-linecap="round" fill="none" opacity="0.95">
    <line x1="0" y1="0" x2="0" y2="148"/>
    <path d="M0 0 Q28 28 0 76" fill="white" stroke="none" opacity="0.9"/>
  </g>

  <!-- Steam lines -->
  <g stroke="white" stroke-width="9" stroke-linecap="round" opacity="0.65">
    <path d="M224 192 Q214 168 224 144" fill="none"/>
    <path d="M256 186 Q246 162 256 138" fill="none"/>
    <path d="M288 192 Q278 168 288 144" fill="none"/>
  </g>

  <!-- Bottom label -->
  <text x="256" y="478" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="white" text-anchor="middle" opacity="0.9" letter-spacing="1">PANTRY TO PLATE</text>
</svg>
